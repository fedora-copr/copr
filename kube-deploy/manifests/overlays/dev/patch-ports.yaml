---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-frontend
spec:
  template:
    spec:
      initContainers:
        - name: frontend-init
          imagePullPolicy: Never
      containers:
        - name: frontend
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              hostPort: 5000
              protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-backend
spec:
  template:
    spec:
      containers:
        - name: backend-log
          imagePullPolicy: Never
        - name: backend-build
          imagePullPolicy: Never
        - name: backend-action
          imagePullPolicy: Never
        - name: backend-httpd
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
              hostPort: 5002
              protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-distgit
spec:
  template:
    spec:
      containers:
        - name: distgit
          imagePullPolicy: Never
        - name: distgit-httpd
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
              hostPort: 5001
              protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-keygen
spec:
  template:
    spec:
      containers:
        - name: keygen-signd
          imagePullPolicy: Never
        - name: keygen-httpd
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-database
spec:
  template:
    spec:
      containers:
        - name: database
          imagePullPolicy: Never
          ports:
            - containerPort: 5432
              hostPort: 5009
              protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-redis
spec:
  template:
    spec:
      containers:
        - name: redis
          imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-resalloc
spec:
  template:
    spec:
      containers:
        - name: resalloc
          imagePullPolicy: Never
        - name: resalloc-webui
          imagePullPolicy: Never
          ports:
            - containerPort: 5007
              hostPort: 5007
              protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-pulp
spec:
  template:
    spec:
      containers:
        - name: pulp
          ports:
            - containerPort: 80
              hostPort: 5006
              protocol: TCP
