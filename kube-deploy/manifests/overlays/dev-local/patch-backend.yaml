apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-backend
spec:
  template:
    spec:
      containers:
        - name: backend-log
          env:
            - name: PYTHONPATH
              value: "/opt/copr/backend:/opt/copr/common"
          volumeMounts:
            - name: copr-source
              mountPath: /opt/copr
        - name: backend-build
          env:
            - name: PYTHONPATH
              value: "/opt/copr/backend:/opt/copr/common"
          volumeMounts:
            - name: copr-source
              mountPath: /opt/copr
        - name: backend-action
          env:
            - name: PYTHONPATH
              value: "/opt/copr/backend:/opt/copr/common"
          volumeMounts:
            - name: copr-source
              mountPath: /opt/copr
      volumes:
        - name: copr-source
          hostPath:
            path: COPR_SOURCE_PATH
            type: Directory
