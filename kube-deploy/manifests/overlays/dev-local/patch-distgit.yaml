apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-distgit
spec:
  template:
    spec:
      containers:
        - name: distgit
          env:
            - name: PYTHONPATH
              value: "/opt/copr/dist-git:/opt/copr/common"
          volumeMounts:
            - name: copr-source
              mountPath: /opt/copr
        - name: distgit-httpd
          volumeMounts:
            - name: copr-source
              mountPath: /opt/copr
      volumes:
        - name: copr-source
          hostPath:
            path: COPR_SOURCE_PATH
            type: Directory
