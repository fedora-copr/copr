---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copr-backend
  labels:
    app: copr
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      component: backend
  template:
    metadata:
      labels:
        app: copr
        component: backend
    spec:
      securityContext:
        fsGroup: 987
      initContainers:
        - name: wait-redis
          image: copr-backend:latest
          command:
            [
              "sh",
              "-c",
              "until nc -z redis 6379; do echo 'waiting for redis'; sleep 2; done",
            ]
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
            requests:
              memory: "32Mi"
              cpu: "50m"
        - name: wait-resalloc
          image: copr-backend:latest
          command:
            [
              "sh",
              "-c",
              "until nc -z resalloc 49100; do echo 'waiting for resalloc'; sleep 2; done",
            ]
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
            requests:
              memory: "32Mi"
              cpu: "50m"
        - name: render-config
          image: copr-backend:latest
          command:
            - sh
            - "-c"
            - 'python3 -c "import os,sys; sys.stdout.write(open(''/etc/copr-template/copr-be.conf'').read().replace(''__COPR_BACKEND_FRONTEND_AUTH__'', os.environ[''COPR_FRONTEND_AUTH'']))" > /etc/copr-rendered/copr-be.conf'
          env:
            - name: COPR_FRONTEND_AUTH
              valueFrom:
                secretKeyRef:
                  name: copr-backend-secrets
                  key: frontend-auth
          volumeMounts:
            - name: backend-config
              mountPath: /etc/copr-template/copr-be.conf
              subPath: copr-be.conf
            - name: backend-config-rendered
              mountPath: /etc/copr-rendered
          resources:
            limits:
              memory: "64Mi"
              cpu: "100m"
            requests:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: backend-log
          image: copr-backend:latest
          command:
            - /usr/bin/tini
            - "--"
            - /usr/bin/copr_run_logger.py
          volumeMounts:
            - name: results-data
              mountPath: /var/lib/copr/public_html/results
            - name: backend-config-rendered
              mountPath: /etc/copr/copr-be.conf
              subPath: copr-be.conf
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "copr_run_logger"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "160Mi"
              cpu: "120m"

        - name: backend-build
          image: copr-backend:latest
          command:
            - /usr/bin/tini
            - "--"
            - /run-backend
            - "--sign-host"
            - "keygen"
            - /usr/bin/copr-run-dispatcher-backend
            - builds
          volumeMounts:
            - name: results-data
              mountPath: /var/lib/copr/public_html/results
            - name: backend-config-rendered
              mountPath: /etc/copr/copr-be.conf
              subPath: copr-be.conf
            - name: ssh-keys
              mountPath: /home/copr/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: ssh-keys
              mountPath: /home/copr/.ssh/id_ed25519.pub
              subPath: id_ed25519.pub
              readOnly: true
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "copr-run-dispatcher"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "300m"

        - name: backend-action
          image: copr-backend:latest
          command:
            - /usr/bin/tini
            - "--"
            - /run-backend
            - "--sign-host"
            - "keygen"
            - /usr/bin/copr-run-dispatcher-backend
            - actions
          volumeMounts:
            - name: results-data
              mountPath: /var/lib/copr/public_html/results
            - name: backend-config-rendered
              mountPath: /etc/copr/copr-be.conf
              subPath: copr-be.conf
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "copr-run-dispatcher"]
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "120m"

        - name: backend-httpd
          image: copr-backend-httpd:latest
          ports:
            - containerPort: 5002
              protocol: TCP
          volumeMounts:
            - name: results-data
              mountPath: /var/lib/copr/public_html/results
          readinessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "160Mi"
              cpu: "120m"

      volumes:
        - name: backend-config
          configMap:
            name: copr-backend-config
        - name: backend-config-rendered
          emptyDir: {}
        - name: results-data
          persistentVolumeClaim:
            claimName: copr-results-data
        - name: ssh-keys
          secret:
            secretName: copr-ssh-keys
            defaultMode: 0640
            optional: true
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: backend-httpd
spec:
  selector:
    component: backend
  ports:
    - name: http
      port: 5002
      targetPort: 5002
      protocol: TCP
